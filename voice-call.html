<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосовые звонки  МойГород</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script type="module">
        import { auth } from '/assets/js/firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { loadHeader } from '/assets/js/header.js';
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            await loadHeader('voice-call');
            document.getElementById('app').innerHTML += `
                <div class="container mx-auto px-4 py-8 text-center">
                    <i class="fas fa-phone-alt text-6xl text-blue-500 mb-4"></i>
                    <h1 class="text-3xl font-bold mb-4">Голосовые звонки</h1>
                    <p class="text-gray-600 mb-6">Функция в разработке. Скоро вы сможете звонить друг другу!</p>
                    <a href="/" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">На главную</a>
                </div>
            `;
        });
    </script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100">
    <div id="app"></div>
</body>
</html>
