<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход  МойГород</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/auth.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96 transform transition-all hover:scale-105">
        <div class="text-center mb-6">
            <i class="fas fa-city text-5xl text-blue-600"></i>
            <h2 class="text-2xl font-bold mt-2 text-gray-800">МойГород</h2>
            <p class="text-gray-500">Войдите в свой аккаунт</p>
        </div>
        <div id="error" class="hidden bg-red-100 text-red-700 p-2 rounded mb-2 text-sm"></div>
        <input id="email" type="email" placeholder="Email" class="w-full border rounded-lg p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400">
        <input id="password" type="password" placeholder="Пароль" class="w-full border rounded-lg p-3 mb-6 focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition">Войти</button>
        <div class="mt-4 text-center text-sm">
            Нет аккаунта? <a href="register.html" class="text-blue-600 hover:underline">Зарегистрироваться</a>
        </div>
    </div>
</body>
</html>
